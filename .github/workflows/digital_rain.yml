name: Digital Rain Demo

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Run digital rain
        env:
          TERM: xterm
        run: |
          python digital_rain.py --duration 2 --speed 0.02
